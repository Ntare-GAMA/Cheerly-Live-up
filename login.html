<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cheerly Live Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #fbbf24;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f0fdf4;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: linear-gradient(135deg, var(--bg-light) 0%, #fef3c7 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(16, 185, 129, 0.1);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: var(--primary);
        }

        .login-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 3rem 5%;
        }

        .login-card {
            background: white;
            padding: 4rem;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 100%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        .login-header h1 {
            font-size: 2rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .login-header p {
            color: var(--text-light);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: var(--text-dark);
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e5e7eb;
            border-radius: 10px;
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .remember-me input[type="checkbox"] {
            width: auto;
        }

        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .forgot-password:hover {
            text-decoration: underline;
        }

        .login-button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .login-button:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(16, 185, 129, 0.3);
        }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-light);
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 42%;
            height: 1px;
            background: #e5e7eb;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .social-login {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .social-button {
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .social-button:hover {
            border-color: var(--primary);
            background: var(--bg-light);
        }

        .signup-link {
            text-align: center;
            color: var(--text-light);
            padding-top: 1.5rem;
            border-top: 1px solid #e5e7eb;
        }

        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }

        .signup-link a:hover {
            text-decoration: underline;
        }

        .error-message {
            display: none;
            background: #fee2e2;
            border: 2px solid #ef4444;
            color: #dc2626;
            padding: 1rem;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .error-message.show {
            display: block;
            animation: shake 0.5s;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .quick-access {
            background: var(--bg-light);
            padding: 1rem;
            border-radius: 10px;
            margin-top: 1.5rem;
            text-align: center;
        }

        .quick-access p {
            font-size: 0.9rem;
            color: var(--text-light);
            margin-bottom: 0.75rem;
        }

        .quick-links {
            display: flex;
            justify-content: center;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .quick-link {
            padding: 0.5rem 1rem;
            background: white;
            border: 2px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            transition: all 0.3s;
        }

        .quick-link:hover {
            background: var(--primary);
            color: white;
        }

        @media (max-width: 768px) {
            .nav-links {
                display: none;
            }
            .login-card {
                padding: 3rem 2rem;
            }
            .login-header h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>
    <!-- SVG Icon Sprite Library -->
    <svg style="display: none;" aria-hidden="true">
        <defs>
            <symbol id="icon-star" viewBox="0 0 24 24">
                <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
            </symbol>
            <symbol id="icon-hand-wave" viewBox="0 0 24 24">
                <path d="M7 2c-1.1 0-2 .9-2 2v8c0 1.1.9 2 2 2h2v-2H7V4h2V2H7zm8 0c1.1 0 2 .9 2 2v8c0 1.1-.9 2-2 2h-2v-2h2V4h-2V2h2zm-4 6v10c0 1.1.9 2 2 2h2c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-2c-1.1 0-2 .9-2 2z"/>
            </symbol>
            <symbol id="icon-unlock" viewBox="0 0 24 24">
                <path d="M12 17c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm6-9h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6h1.9c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2z"/>
            </symbol>
            <symbol id="icon-chat" viewBox="0 0 24 24">
                <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
            </symbol>
            <symbol id="icon-book" viewBox="0 0 24 24">
                <path d="M18 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/>
            </symbol>
            <symbol id="icon-info" viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/>
            </symbol>
        </defs>
    </svg>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <span style="font-size: inherit;">🌟</span>
            <span>Cheerly Live Up</span>
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="signup.html">Sign Up</a></li>
        </ul>
    </nav>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">❓</div>
                <h1>Welcome Back!</h1>
                <p>Login to continue your wellbeing journey</p>
            </div>

            <div class="error-message" id="errorMessage">
                ✗ Invalid email or password. Please try again.
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required placeholder="your.email@example.com">
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>

                <div class="form-options">
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember" style="font-weight: normal; margin-bottom: 0;">Remember me</label>
                    </div>
                    <a href="reset-password.html" class="forgot-password">Forgot password?</a>
                </div>

                <button type="submit" class="login-button">Login ❓</button>
            </form>

            <div class="divider">or continue with</div>

            <div class="social-login">
                <button class="social-button" onclick="socialLogin('google')">
                    🔵 Continue with Google
                </button>
                <button class="social-button" onclick="socialLogin('facebook')">
                    📘 Continue with Facebook
                </button>
            </div>

            <div class="signup-link">
                Don't have an account? <a href="signup.html">Sign up for free</a>
            </div>

            <div class="quick-access">
                <p>Or explore without an account:</p>
                <div class="quick-links">
                    <a href="chat.html" class="quick-link">💬 Chat</a>
                    <a href="resources.html" class="quick-link">📚 Resources</a>
                    <a href="about.html" class="quick-link">ℹ️ About</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const remember = document.getElementById('remember').checked;
            
            // In a real application, this would validate against a server
            // For demo purposes, we'll check if user exists in localStorage
            const storedUser = JSON.parse(localStorage.getItem('cheerlyUser') || '{}');
            
            // Simple demo validation - accept any email/password combination
            // In production, this would be properly secured
            if (email && password.length >= 6) {
                // Set login state
                localStorage.setItem('isLoggedIn', 'true');
                
                // If no user data exists, create demo data
                if (!storedUser.email) {
                    const userData = {
                        fullName: email.split('@')[0],
                        email: email,
                        signupDate: new Date().toISOString()
                    };
                    localStorage.setItem('cheerlyUser', JSON.stringify(userData));
                }
                
                // Redirect to dashboard
                window.location.href = 'dashboard.html';
            } else {
                // Show error message
                const errorMessage = document.getElementById('errorMessage');
                errorMessage.classList.add('show');
                
                setTimeout(() => {
                    errorMessage.classList.remove('show');
                }, 3000);
            }
        }

        function socialLogin(provider) {
            // In a real application, this would initiate OAuth flow
            alert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login coming soon! For now, please use email login or sign up.`);
        }

        // Check if already logged in
        window.addEventListener('load', function() {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                if (confirm('You are already logged in. Would you like to go to your dashboard?')) {
                    window.location.href = 'dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
