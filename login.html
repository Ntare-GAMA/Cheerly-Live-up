<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Cheerly Live Up</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-glow: rgba(16, 185, 129, 0.15);
            --secondary: #fbbf24;
            --accent: #8b5cf6;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f0fdf4;
            --card-shadow: 0 25px 60px rgba(0, 0, 0, 0.12);
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            min-height: 100vh;
            overflow-x: hidden;
            background: #f8fafc;
        }

        /* ─── Animated Background ─── */
        .bg-animation {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            background: linear-gradient(135deg, #ecfdf5 0%, #fef9c3 50%, #ede9fe 100%);
            overflow: hidden;
        }
        .bg-animation .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: blobFloat 8s ease-in-out infinite alternate;
        }
        .blob-1 { width: 500px; height: 500px; background: var(--primary-glow); top: -100px; left: -100px; }
        .blob-2 { width: 400px; height: 400px; background: rgba(251,191,36,0.15); bottom: -50px; right: -50px; animation-delay: 2s; }
        .blob-3 { width: 300px; height: 300px; background: rgba(139,92,246,0.1); top: 50%; left: 50%; animation-delay: 4s; }

        @keyframes blobFloat {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -30px) scale(1.1); }
        }

        /* ─── Navbar ─── */
        .navbar {
            position: relative; z-index: 10;
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(20px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(16,185,129,0.08);
        }
        .logo {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }
        .logo-dot {
            width: 10px; height: 10px;
            background: var(--secondary);
            border-radius: 50%;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }
        @keyframes pulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.3); opacity: 0.7; } }
        .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
            align-items: center;
        }
        .nav-links a {
            text-decoration: none;
            color: var(--text-light);
            font-weight: 600;
            font-size: 0.95rem;
            transition: color 0.3s;
        }
        .nav-links a:hover { color: var(--primary); }
        .nav-cta {
            padding: 0.6rem 1.5rem;
            background: var(--primary);
            color: white !important;
            border-radius: 50px;
            transition: all 0.3s !important;
            box-shadow: 0 4px 15px rgba(16,185,129,0.3);
        }
        .nav-cta:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(16,185,129,0.4); }

        /* ─── Main Layout ─── */
        .login-wrapper {
            position: relative; z-index: 5;
            display: grid;
            grid-template-columns: 1fr 1fr;
            min-height: calc(100vh - 65px);
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem 5%;
            align-items: center;
            gap: 4rem;
        }

        /* ─── Left Side - Illustration ─── */
        .login-visual {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            animation: slideInLeft 0.8s ease-out;
        }
        @keyframes slideInLeft {
            from { opacity: 0; transform: translateX(-40px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .illustration-container {
            position: relative;
            width: 100%;
            max-width: 500px;
        }

        /* Cartoon SVG Scene */
        .scene-svg { width: 100%; height: auto; }
        .scene-svg .ground { fill: #d1fae5; }
        .scene-svg .tree-trunk { fill: #92400e; }
        .scene-svg .tree-leaves { fill: var(--primary); animation: treeWave 4s ease-in-out infinite; transform-origin: center bottom; }
        .scene-svg .tree-leaves-2 { fill: #059669; animation: treeWave 4s ease-in-out infinite 0.5s; transform-origin: center bottom; }
        .scene-svg .sun { fill: var(--secondary); animation: sunGlow 3s ease-in-out infinite; }
        .scene-svg .sun-ray { fill: rgba(251,191,36,0.3); animation: sunGlow 3s ease-in-out infinite; }
        .scene-svg .cloud { fill: white; animation: cloudDrift 12s linear infinite; }
        .scene-svg .cloud-2 { animation-delay: -6s; animation-duration: 15s; }
        .scene-svg .person-body { fill: var(--primary-dark); }
        .scene-svg .person-head { fill: #f5d0a9; }
        .scene-svg .person-hair { fill: #1f2937; }
        .scene-svg .phone-screen { fill: #ecfdf5; }
        .scene-svg .heart { fill: #f472b6; animation: heartBeat 1.5s ease-in-out infinite; transform-origin: center; }
        .scene-svg .bird { fill: var(--accent); animation: birdFly 6s ease-in-out infinite; }
        .scene-svg .bird-2 { animation-delay: 1.5s; }
        .scene-svg .butterfly { animation: butterflyFloat 4s ease-in-out infinite; }
        .scene-svg .flower { fill: #f472b6; }
        .scene-svg .flower-stem { fill: #059669; }
        .scene-svg .star { fill: var(--secondary); animation: twinkle 2s ease-in-out infinite; }
        .scene-svg .star:nth-child(2) { animation-delay: 0.5s; }
        .scene-svg .star:nth-child(3) { animation-delay: 1s; }

        @keyframes treeWave { 0%,100% { transform: rotate(0deg); } 50% { transform: rotate(2deg); } }
        @keyframes sunGlow { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.85; transform: scale(1.05); } }
        @keyframes cloudDrift { 0% { transform: translateX(-120px); } 100% { transform: translateX(520px); } }
        @keyframes heartBeat { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
        @keyframes birdFly {
            0%,100% { transform: translate(0,0) scaleX(1); }
            25% { transform: translate(20px, -15px) scaleX(1); }
            50% { transform: translate(40px, -5px) scaleX(-1); }
            75% { transform: translate(20px, -20px) scaleX(-1); }
        }
        @keyframes butterflyFloat {
            0%,100% { transform: translate(0,0) rotate(0deg); }
            25% { transform: translate(10px,-15px) rotate(5deg); }
            50% { transform: translate(20px,-5px) rotate(-3deg); }
            75% { transform: translate(5px,-18px) rotate(3deg); }
        }
        @keyframes twinkle { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        .visual-tagline {
            text-align: center;
            margin-top: 2rem;
        }
        .visual-tagline h2 {
            font-size: 1.6rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }
        .visual-tagline p {
            color: var(--text-light);
            font-size: 1.05rem;
        }

        /* Trust badges */
        .trust-badges {
            display: flex;
            gap: 1.5rem;
            margin-top: 2rem;
            flex-wrap: wrap;
            justify-content: center;
        }
        .trust-badge {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            font-size: 0.85rem;
            color: var(--text-light);
            font-weight: 600;
        }
        .trust-badge svg {
            width: 16px; height: 16px;
            fill: var(--primary);
        }

        /* ─── Right Side - Login Form ─── */
        .login-form-section {
            animation: slideInRight 0.8s ease-out;
        }
        @keyframes slideInRight {
            from { opacity: 0; transform: translateX(40px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .login-card {
            background: rgba(255,255,255,0.85);
            backdrop-filter: blur(20px);
            padding: 3rem;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid rgba(255,255,255,0.8);
            max-width: 480px;
            width: 100%;
            transition: box-shadow 0.4s;
        }
        .login-card:hover {
            box-shadow: 0 30px 80px rgba(16,185,129,0.15);
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .login-header .wave-emoji {
            font-size: 2.5rem;
            display: inline-block;
            animation: wave 2.5s ease-in-out infinite;
            transform-origin: 70% 70%;
        }
        @keyframes wave {
            0%,100% { transform: rotate(0deg); }
            10% { transform: rotate(14deg); }
            20% { transform: rotate(-8deg); }
            30% { transform: rotate(14deg); }
            40% { transform: rotate(-4deg); }
            50% { transform: rotate(10deg); }
            60%,100% { transform: rotate(0deg); }
        }
        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--text-dark);
            margin-top: 0.5rem;
        }
        .login-header p {
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .form-group {
            margin-bottom: 1.25rem;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.4rem;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-dark);
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper svg {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px; height: 18px;
            fill: var(--text-light);
            transition: fill 0.3s;
        }
        .form-group input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 2.8rem;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            font-family: inherit;
            font-size: 0.95rem;
            transition: all 0.3s;
            background: rgba(255,255,255,0.7);
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px var(--primary-glow);
        }
        .form-group input:focus + svg,
        .form-group input:focus ~ svg { fill: var(--primary); }

        .toggle-password {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-light);
            padding: 4px;
        }
        .toggle-password:hover { color: var(--primary); }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .remember-me input[type="checkbox"] { width: auto; accent-color: var(--primary); }
        .forgot-password {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
        .forgot-password:hover { text-decoration: underline; }

        .login-button {
            width: 100%;
            padding: 0.95rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16,185,129,0.4);
        }
        .login-button:active { transform: translateY(0); }
        .login-button.loading {
            pointer-events: none;
            opacity: 0.8;
        }
        .btn-spinner {
            display: none;
            width: 20px; height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }
        .login-button.loading .btn-text { display: none; }
        .login-button.loading .btn-spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .divider {
            text-align: center;
            margin: 1.5rem 0;
            color: var(--text-light);
            position: relative;
            font-size: 0.85rem;
        }
        .divider::before, .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e5e7eb;
        }
        .divider::before { left: 0; }
        .divider::after { right: 0; }

        .social-login {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .social-button {
            flex: 1;
            padding: 0.75rem;
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .social-button:hover {
            border-color: var(--primary);
            background: var(--bg-light);
            transform: translateY(-2px);
        }

        .signup-link {
            text-align: center;
            color: var(--text-light);
            font-size: 0.95rem;
        }
        .signup-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 700;
        }
        .signup-link a:hover { text-decoration: underline; }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 80px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.9rem;
            z-index: 100;
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.68, -0.55, 0.27, 1.55);
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }
        .toast.show { transform: translateX(0); }
        .toast.error { background: #fee2e2; color: #dc2626; border: 1px solid #fca5a5; }
        .toast.success { background: #ecfdf5; color: #059669; border: 1px solid #6ee7b7; }

        /* ─── Responsive ─── */
        @media (max-width: 968px) {
            .login-wrapper { grid-template-columns: 1fr; gap: 2rem; }
            .login-visual { display: none; }
            .login-form-section { display: flex; justify-content: center; }
        }
        @media (max-width: 768px) {
            .nav-links { display: none; }
            .login-card { padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="bg-animation">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <nav class="navbar">
        <a href="index.html" class="logo">
            <span class="logo-dot"></span>
            Cheerly Live Up
        </a>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="signup.html" class="nav-cta">Sign Up Free</a></li>
        </ul>
    </nav>

    <div class="toast" id="toast"></div>

    <div class="login-wrapper">
        <!-- Left Side: Cartoon Illustration -->
        <div class="login-visual">
            <div class="illustration-container">
                <svg class="scene-svg" viewBox="0 0 500 400" xmlns="http://www.w3.org/2000/svg">
                    <!-- Sky gradient -->
                    <defs>
                        <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
                            <stop offset="0%" style="stop-color:#bae6fd;stop-opacity:1" />
                            <stop offset="100%" style="stop-color:#ecfdf5;stop-opacity:1" />
                        </linearGradient>
                    </defs>
                    <rect width="500" height="400" fill="url(#skyGrad)" rx="20"/>

                    <!-- Sun -->
                    <circle class="sun-ray" cx="420" cy="70" r="50"/>
                    <circle class="sun" cx="420" cy="70" r="32"/>

                    <!-- Clouds -->
                    <g class="cloud">
                        <ellipse cx="100" cy="60" rx="40" ry="18"/>
                        <ellipse cx="120" cy="50" rx="30" ry="15"/>
                        <ellipse cx="80" cy="55" rx="25" ry="12"/>
                    </g>
                    <g class="cloud cloud-2">
                        <ellipse cx="300" cy="90" rx="35" ry="14"/>
                        <ellipse cx="318" cy="82" rx="25" ry="12"/>
                        <ellipse cx="285" cy="85" rx="20" ry="10"/>
                    </g>

                    <!-- Stars / sparkles -->
                    <polygon class="star" points="150,35 153,43 161,43 155,48 157,56 150,52 143,56 145,48 139,43 147,43"/>
                    <polygon class="star" points="50,100 52,106 58,106 53,109 55,115 50,112 45,115 47,109 42,106 48,106"/>
                    <polygon class="star" points="350,40 352,46 358,46 354,49 355,55 350,52 345,55 347,49 342,46 348,46"/>

                    <!-- Ground -->
                    <ellipse class="ground" cx="250" cy="370" rx="280" ry="60"/>

                    <!-- Flowers -->
                    <line class="flower-stem" x1="80" y1="340" x2="80" y2="310" stroke="#059669" stroke-width="3"/>
                    <circle class="flower" cx="80" cy="305" r="8"/>
                    <circle cx="80" cy="305" r="4" fill="#fbbf24"/>

                    <line class="flower-stem" x1="420" y1="345" x2="420" y2="318" stroke="#059669" stroke-width="3"/>
                    <circle class="flower" cx="420" cy="313" r="7"/>
                    <circle cx="420" cy="313" r="3.5" fill="#fbbf24"/>

                    <line class="flower-stem" x1="370" y1="350" x2="370" y2="325" stroke="#059669" stroke-width="2.5"/>
                    <circle cx="370" cy="321" r="6" fill="#a78bfa"/>
                    <circle cx="370" cy="321" r="3" fill="#fbbf24"/>

                    <!-- Tree -->
                    <rect class="tree-trunk" x="50" y="260" width="18" height="80" rx="5"/>
                    <ellipse class="tree-leaves" cx="59" cy="245" rx="45" ry="40"/>
                    <ellipse class="tree-leaves-2" cx="59" cy="230" rx="35" ry="30"/>

                    <!-- Tree 2 (right side) -->
                    <rect class="tree-trunk" x="435" y="265" width="14" height="70" rx="4"/>
                    <ellipse class="tree-leaves" cx="442" cy="250" rx="38" ry="35" style="animation-delay: 1s;"/>
                    <ellipse class="tree-leaves-2" cx="442" cy="238" rx="28" ry="25" style="animation-delay: 1.5s;"/>

                    <!-- Person sitting with phone -->
                    <!-- Bench -->
                    <rect x="200" y="310" width="100" height="8" rx="4" fill="#92400e"/>
                    <rect x="210" y="318" width="8" height="35" rx="2" fill="#92400e"/>
                    <rect x="282" y="318" width="8" height="35" rx="2" fill="#92400e"/>

                    <!-- Person body -->
                    <ellipse class="person-body" cx="250" cy="300" rx="22" ry="25"/>
                    <!-- Legs -->
                    <rect fill="#1e40af" x="238" y="315" width="12" height="30" rx="5"/>
                    <rect fill="#1e40af" x="254" y="315" width="12" height="30" rx="5"/>
                    <!-- Arm holding phone -->
                    <rect class="person-body" x="265" y="280" width="10" height="28" rx="5" transform="rotate(15, 270, 280)"/>
                    <!-- Phone -->
                    <rect x="272" y="270" width="18" height="30" rx="4" fill="#1f2937"/>
                    <rect class="phone-screen" x="274" y="273" width="14" height="24" rx="2"/>
                    <!-- Cheerly on phone screen - small heart -->
                    <circle cx="281" cy="282" r="3" fill="var(--primary)"/>
                    <!-- Person head -->
                    <circle class="person-head" cx="250" cy="268" r="18"/>
                    <!-- Hair -->
                    <path class="person-hair" d="M232,260 Q235,245 250,244 Q265,245 268,260 Q268,254 260,250 Q250,248 240,250 Q232,254 232,260Z"/>
                    <!-- Smile -->
                    <path d="M244,273 Q250,279 256,273" fill="none" stroke="#1f2937" stroke-width="1.5" stroke-linecap="round"/>
                    <!-- Eyes -->
                    <circle cx="244" cy="266" r="2" fill="#1f2937"/>
                    <circle cx="256" cy="266" r="2" fill="#1f2937"/>

                    <!-- Floating hearts around person -->
                    <g class="heart" style="animation-delay: 0s;">
                        <path d="M290,250 L294,246 Q298,240 302,246 L306,250 L298,260 Z" transform="scale(0.6) translate(160, 100)"/>
                    </g>
                    <g class="heart" style="animation-delay: 0.5s;">
                        <path d="M290,250 L294,246 Q298,240 302,246 L306,250 L298,260 Z" transform="scale(0.5) translate(400, 360)"/>
                    </g>

                    <!-- Butterfly -->
                    <g class="butterfly" transform="translate(160, 200)">
                        <ellipse cx="0" cy="0" rx="8" ry="5" fill="rgba(251,191,36,0.7)" transform="rotate(-30)"/>
                        <ellipse cx="0" cy="0" rx="8" ry="5" fill="rgba(139,92,246,0.7)" transform="rotate(30)"/>
                        <ellipse cx="0" cy="0" rx="2" ry="1" fill="#1f2937"/>
                    </g>

                    <!-- Birds -->
                    <path class="bird" d="M130,130 Q135,122 140,130" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>
                    <path class="bird bird-2" d="M170,110 Q175,102 180,110" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round"/>

                    <!-- Chat bubble from phone -->
                    <g transform="translate(295, 245)" opacity="0.9">
                        <rect width="70" height="28" rx="10" fill="white" stroke="var(--primary)" stroke-width="1.5"/>
                        <text x="10" y="18" font-size="9" font-weight="600" fill="var(--primary)">You're great!</text>
                        <polygon points="10,28 20,28 15,35" fill="white" stroke="var(--primary)" stroke-width="1.5" stroke-linejoin="round"/>
                    </g>
                </svg>
            </div>

            <div class="visual-tagline">
                <h2>Welcome back, friend</h2>
                <p>Your wellbeing journey continues here</p>
            </div>

            <div class="trust-badges">
                <div class="trust-badge">
                    <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
                    256-bit encrypted
                </div>
                <div class="trust-badge">
                    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    10K+ users
                </div>
                <div class="trust-badge">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
                    100% Free
                </div>
            </div>
        </div>

        <!-- Right Side: Login Form -->
        <div class="login-form-section">
            <div class="login-card">
                <div class="login-header">
                    <span class="wave-emoji">👋</span>
                    <h1>Welcome Back!</h1>
                    <p>Log in to continue your wellbeing journey</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <div class="input-wrapper">
                            <input type="email" id="email" name="email" required placeholder="you@example.com" autocomplete="email">
                            <svg viewBox="0 0 24 24" style="pointer-events:none;"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" required placeholder="Enter your password" autocomplete="current-password">
                            <svg viewBox="0 0 24 24" style="pointer-events:none;"><path d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/></svg>
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
                            </button>
                        </div>
                    </div>

                    <div class="form-options">
                        <div class="remember-me">
                            <input type="checkbox" id="remember" name="remember">
                            <label for="remember" style="font-weight:500; margin-bottom:0; font-size:0.9rem;">Remember me</label>
                        </div>
                        <a href="reset-password.html" class="forgot-password">Forgot password?</a>
                    </div>

                    <button type="submit" class="login-button" id="loginBtn">
                        <span class="btn-text">Log In</span>
                        <div class="btn-spinner"></div>
                    </button>
                </form>

                <div class="divider">or continue with</div>

                <div class="social-login">
                    <button class="social-button" onclick="socialLogin('google')">
                        <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        Google
                    </button>
                    <button class="social-button" onclick="socialLogin('facebook')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="#1877F2"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                        Facebook
                    </button>
                </div>

                <div class="signup-link">
                    Don't have an account? <a href="signup.html">Sign up free</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = window.location.origin + '/api';

        function showToast(message, type = 'error') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast ' + type;
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        function togglePassword() {
            const pw = document.getElementById('password');
            pw.type = pw.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            if (!email || password.length < 6) {
                showToast('Please enter a valid email and password (min 6 chars).', 'error');
                btn.classList.remove('loading');
                return;
            }

            try {
                const res = await fetch(API_BASE + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (res.ok && data.token) {
                    localStorage.setItem('cheerlyToken', data.token);
                    localStorage.setItem('isLoggedIn', 'true');
                    if (data.user) {
                        localStorage.setItem('cheerlyUser', JSON.stringify(data.user));
                    }
                    showToast('Welcome back! Redirecting...', 'success');
                    setTimeout(() => { window.location.href = 'dashboard.html'; }, 1000);
                } else {
                    showToast(data.error || 'Invalid email or password.', 'error');
                    btn.classList.remove('loading');
                }
            } catch (err) {
                // Offline / server not running — fallback to demo mode
                console.warn('Server unavailable, using demo login:', err);
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('cheerlyUser', JSON.stringify({
                    fullName: email.split('@')[0],
                    email: email,
                    signupDate: new Date().toISOString()
                }));
                showToast('Demo mode — redirecting to dashboard...', 'success');
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1200);
            }
        });

        function socialLogin(provider) {
            showToast(provider.charAt(0).toUpperCase() + provider.slice(1) + ' login coming soon!', 'error');
        }

        // Check if already logged in
        window.addEventListener('load', function() {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                if (confirm('You are already logged in. Go to dashboard?')) {
                    window.location.href = 'dashboard.html';
                }
            }
        });
    </script>
</body>
</html>
