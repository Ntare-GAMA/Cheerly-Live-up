<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment successful - Cheerly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, system-ui, sans-serif; min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(145deg, #ecfdf5, #fff7ed); color: #0f172a; padding: 2rem; text-align: center; }
    .card { background: #fff; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(16,185,129,0.2); max-width: 420px; }
    h1 { color: #059669; margin-bottom: 0.5rem; }
    p { color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }
    a { display: inline-block; padding: 0.85rem 1.5rem; background: #10b981; color: #fff; text-decoration: none; font-weight: 700; border-radius: 12px; }
    a:hover { opacity: 0.95; }
    code { font-size: 0.8rem; word-break: break-all; color: #334155; }
  </style>
</head>
<body>
  <div class="card">
    <h1>You're all set!</h1>
    <p>Thanks for subscribing to Cheerly Premium. Your Stripe checkout completed successfully.</p>
    <p id="sid" style="font-size: 0.85rem;"></p>
    <a href="dashboard.html">Go to dashboard</a>
    <p style="margin-top: 1.5rem;"><a href="index.html" style="background: transparent; color: #10b981;">Back home</a></p>
  </div>
  <script>
    var p = new URLSearchParams(location.search).get('session_id');
    if (p) document.getElementById('sid').innerHTML = 'Session: <code>' + p + '</code>';
  </script>
</body>
</html>
