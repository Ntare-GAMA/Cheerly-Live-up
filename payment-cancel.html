<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout cancelled - Cheerly</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@600;800&display=swap" rel="stylesheet">
  <style>
    body { font-family: Inter, system-ui, sans-serif; min-height: 100vh; margin: 0; display: flex; align-items: center; justify-content: center;

    .card { background: #fff; padding: 2.5rem; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.08); max-width: 420px; }

    p { color: #64748b; line-height: 1.6; margin-bottom: 1.5rem; }

<body>
  <div class="card">
    <h1>No charge made</h1>
    <p>You left the Stripe checkout before paying. Your account stayed on its previous plan.</p>
    <a href="payment.html">Try checkout again</a>
    <p style="margin-top: 1.25rem;"><a href="pricing.html" style="background: #f1f5f9; color: #334155;">View pricing</a></p>
