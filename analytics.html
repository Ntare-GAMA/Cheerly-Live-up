<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics - Cheerly Live Up</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --secondary: #fbbf24;
            --text-dark: #1f2937;
            --text-light: #6b7280;
            --bg-light: #f0fdf4;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            line-height: 1.6;
            color: var(--text-dark);
            background: #f9fafb;
        }

        .navbar {
            position: fixed;
            width: 100%;
            top: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 20px rgba(16, 185, 129, 0.1);
            z-index: 1000;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .nav-link {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 500;
            transition: color 0.3s;
        }

        .nav-link:hover {
            color: var(--primary);
        }

        .container {
            margin-top: 80px;
            padding: 2rem 5%;
            max-width: 1400px;
            margin-left: auto;
            margin-right: auto;
        }

        .page-header {
            margin-bottom: 2rem;
        }

        .page-header h1 {
            font-size: 2.5rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .page-header p {
            color: var(--text-light);
            font-size: 1.1rem;
        }

        .time-range-selector {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .time-button {
            padding: 0.75rem 1.5rem;
            background: white;
            border: 2px solid #e5e7eb;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .time-button:hover, .time-button.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .analytics-card {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.08);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .card-title {
            font-size: 1.3rem;
            color: var(--text-dark);
            font-weight: 600;
        }

        .card-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
        }

        .stat-large {
            font-size: 3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.5rem;
        }

        .stat-label {
            color: var(--text-light);
            font-size: 1rem;
        }

        .mood-distribution {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .mood-bar {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .mood-label {
            min-width: 100px;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 600;
        }

        .bar-container {
            flex-grow: 1;
            height: 30px;
            background: #e5e7eb;
            border-radius: 15px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            border-radius: 15px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 10px;
            color: white;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .chart-container {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .mood-timeline {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 250px;
            gap: 0.5rem;
            padding: 1rem 0;
            border-bottom: 2px solid #e5e7eb;
        }

        .timeline-bar {
            flex: 1;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 5px 5px 0 0;
            min-height: 20px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .timeline-bar:hover {
            opacity: 0.8;
        }

        .timeline-bar::after {
            content: attr(data-mood);
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
        }

        .timeline-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 0.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .insights-section {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.08);
            margin-bottom: 2rem;
        }

        .insight-item {
            display: flex;
            align-items: start;
            gap: 1rem;
            padding: 1.5rem;
            background: var(--bg-light);
            border-radius: 15px;
            margin-bottom: 1rem;
            border-left: 4px solid var(--primary);
        }

        .insight-icon {
            font-size: 2rem;
            flex-shrink: 0;
        }

        .insight-content h3 {
            color: var(--text-dark);
            margin-bottom: 0.5rem;
        }

        .insight-content p {
            color: var(--text-light);
        }

        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .analytics-grid {
                grid-template-columns: 1fr;
            }
            .page-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="logo">
            <span style="font-size: inherit;">🌟</span>
            <span>Cheerly Live Up</span>
        </a>
        <div class="nav-right">
            <a href="dashboard.html" class="nav-link">Dashboard</a>
            <a href="mood-tracker.html" class="nav-link">Mood Tracker</a>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>
                <span style="font-size: inherit;">📊</span>
                Your Mood Analytics
            </h1>
            <p>Understand your emotional patterns and track your progress</p>
        </div>

        <div class="time-range-selector">
            <button class="time-button active" onclick="setTimeRange(7)">Last 7 Days</button>
            <button class="time-button" onclick="setTimeRange(30)">Last 30 Days</button>
            <button class="time-button" onclick="setTimeRange(90)">Last 3 Months</button>
            <button class="time-button" onclick="setTimeRange(365)">This Year</button>
        </div>

        <div id="contentArea">
            <!-- Content will be loaded here -->
        </div>
    </div>

    <script>
        // Check if user is logged in
        if (localStorage.getItem('isLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        let currentTimeRange = 7;

        const moodEmojis = {
            amazing: 'mood-happy',
            good: 'mood-good',
            okay: 'mood-okay',
            down: 'mood-down',
            struggling: 'mood-struggling'
        };

        const moodColors = {
            amazing: '#10b981',
            good: '#34d399',
            okay: '#fbbf24',
            down: '#fb923c',
            struggling: '#ef4444'
        };

        function setTimeRange(days) {
            currentTimeRange = days;
            
            // Update button states
            document.querySelectorAll('.time-button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            loadAnalytics();
        }

        function loadAnalytics() {
            const moodHistory = JSON.parse(localStorage.getItem('moodHistory') || '[]');
            const contentArea = document.getElementById('contentArea');
            
            if (moodHistory.length === 0) {
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            📊
                        </div>
                        <h2>No Data Yet</h2>
                        <p>Start tracking your mood to see insights and patterns here!</p>
                        <a href="mood-tracker.html" style="display: inline-block; margin-top: 1.5rem; padding: 1rem 2rem; background: var(--primary); color: white; text-decoration: none; border-radius: 50px; font-weight: 600;">Track Your Mood</a>
                    </div>
                `;
                return;
            }

            // Filter data by time range
            const cutoffDate = new Date();
            cutoffDate.setDate(cutoffDate.getDate() - currentTimeRange);
            
            const filteredData = moodHistory.filter(entry => {
                return new Date(entry.date) >= cutoffDate;
            });

            if (filteredData.length === 0) {
                contentArea.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            📅
                        </div>
                        <h2>No Data for This Period</h2>
                        <p>Try selecting a different time range or log more moods!</p>
                    </div>
                `;
                return;
            }

            // Calculate statistics
            const stats = calculateStats(filteredData);
            
            contentArea.innerHTML = `
                <div class="analytics-grid">
                    <div class="analytics-card">
                        <div class="card-header">
                            <div class="card-title">Total Check-ins</div>
                            <div class="card-icon">
                                <span style="font-size: inherit;">📄</span>
                            </div>
                        </div>
                        <div class="stat-large">${stats.totalEntries}</div>
                        <div class="stat-label">Mood entries logged</div>
                    </div>

                    <div class="analytics-card">
                        <div class="card-header">
                            <div class="card-title">Most Common Mood</div>
                            <div class="card-icon">
                                <span style="font-size: inherit;">❓</span>
                            </div>
                        </div>
                        <div class="stat-large" style="text-transform: capitalize;">${stats.mostCommonMood}</div>
                        <div class="stat-label">${stats.mostCommonPercentage}% of the time</div>
                    </div>

                    <div class="analytics-card">
                        <div class="card-header">
                            <div class="card-title">Current Streak</div>
                            <div class="card-icon">
                                <span style="font-size: inherit;">🔥</span>
                            </div>
                        </div>
                        <div class="stat-large">${stats.streak}</div>
                        <div class="stat-label">Consecutive days</div>
                    </div>
                </div>

                <div class="chart-container">
                    <h2 style="margin-bottom: 1.5rem; color: var(--primary);">
                        <span style="font-size: inherit;">📊</span>
                        Mood Timeline
                    </h2>
                    ${generateMoodTimeline(filteredData)}
                </div>

                <div class="chart-container">
                    <h2 style="margin-bottom: 1.5rem; color: var(--primary);">
                        <span style="font-size: inherit;">📊</span>
                        Mood Distribution
                    </h2>
                    ${generateMoodDistribution(stats.moodCounts, stats.totalEntries)}
                </div>

                <div class="insights-section">
                    <h2 style="margin-bottom: 1.5rem; color: var(--primary);">
                        <span style="font-size: inherit;">💡</span>
                        Insights & Patterns
                    </h2>
                    ${generateInsights(stats, filteredData)}
                </div>
            `;
        }

        function calculateStats(data) {
            const moodCounts = {};
            data.forEach(entry => {
                moodCounts[entry.mood] = (moodCounts[entry.mood] || 0) + 1;
            });

            const mostCommonMood = Object.keys(moodCounts).reduce((a, b) => 
                moodCounts[a] > moodCounts[b] ? a : b
            );

            const streak = calculateStreak(data);

            return {
                totalEntries: data.length,
                moodCounts,
                mostCommonMood,
                mostCommonPercentage: Math.round((moodCounts[mostCommonMood] / data.length) * 100),
                streak
            };
        }

        function calculateStreak(history) {
            if (history.length === 0) return 0;
            
            let streak = 1;
            for (let i = 0; i < history.length - 1; i++) {
                const currentDate = new Date(history[i].date).setHours(0, 0, 0, 0);
                const nextDate = new Date(history[i + 1].date).setHours(0, 0, 0, 0);
                const dayDiff = (currentDate - nextDate) / (1000 * 60 * 60 * 24);
                
                if (dayDiff === 1) {
                    streak++;
                } else {
                    break;
                }
            }
            return streak;
        }

        function generateMoodTimeline(data) {
            const recentData = data.slice(0, 14).reverse();
            
            if (recentData.length === 0) return '<p>No data available</p>';

            const moodValues = {
                amazing: 5,
                good: 4,
                okay: 3,
                down: 2,
                struggling: 1
            };

            const bars = recentData.map(entry => {
                const height = (moodValues[entry.mood] / 5) * 100;
                const date = new Date(entry.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
                return `<div class="timeline-bar" style="height: ${height}%; background: ${moodColors[entry.mood]}" data-mood="${moodEmojis[entry.mood]}" title="${date}: ${entry.mood}"></div>`;
            }).join('');

            const labels = recentData.map(entry => {
                return new Date(entry.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
            });

            return `
                <div class="mood-timeline">
                    ${bars}
                </div>
                <div class="timeline-labels">
                    ${labels.map((label, i) => i % 2 === 0 ? `<span>${label}</span>` : '<span></span>').join('')}
                </div>
            `;
        }

        function generateMoodDistribution(moodCounts, total) {
            const moods = ['amazing', 'good', 'okay', 'down', 'struggling'];
            
            return `
                <div class="mood-distribution">
                    ${moods.map(mood => {
                        const count = moodCounts[mood] || 0;
                        const percentage = total > 0 ? Math.round((count / total) * 100) : 0;
                        return `
                            <div class="mood-bar">
                                <div class="mood-label">
                                    <span style="font-size: inherit;">❓</span>
                                    <span style="text-transform: capitalize;">${mood}</span>
                                </div>
                                <div class="bar-container">
                                    <div class="bar-fill" style="width: ${percentage}%; background: ${moodColors[mood]}">
                                        ${percentage > 5 ? percentage + '%' : ''}
                                    </div>
                                </div>
                                <span style="min-width: 60px; text-align: right; font-weight: 600;">${count} times</span>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
        }

        function generateInsights(stats, data) {
            const insights = [];

            // Positive trend
            if (stats.moodCounts.amazing > 0 || stats.moodCounts.good > 0) {
                const positiveCount = (stats.moodCounts.amazing || 0) + (stats.moodCounts.good || 0);
                const positivePercentage = Math.round((positiveCount / stats.totalEntries) * 100);
                insights.push(`
                    <div class="insight-item">
                        <div class="insight-icon">
                            <span style="font-size: inherit;">🌟</span>
                        </div>
                        <div class="insight-content">
                            <h3>Positive Outlook</h3>
                            <p>You reported feeling good or amazing ${positivePercentage}% of the time. Keep up the positive momentum!</p>
                        </div>
                    </div>
                `);
            }

            // Consistency
            if (stats.streak >= 7) {
                insights.push(`
                    <div class="insight-item">
                        <div class="insight-icon">
                            <span style="font-size: inherit;">🔥</span>
                        </div>
                        <div class="insight-content">
                            <h3>Consistency Streak</h3>
                            <p>You've been tracking your mood for ${stats.streak} days in a row! Regular tracking helps identify patterns and improve self-awareness.</p>
                        </div>
                    </div>
                `);
            }

            // Support suggestion
            if ((stats.moodCounts.down || 0) + (stats.moodCounts.struggling || 0) > stats.totalEntries * 0.3) {
                insights.push(`
                    <div class="insight-item">
                        <div class="insight-icon">
                            <span style="font-size: inherit;">💚</span>
                        </div>
                        <div class="insight-content">
                            <h3>Remember: You're Not Alone</h3>
                            <p>We noticed you've been going through some challenging times. Consider exploring our <a href="resources.html" style="color: var(--primary); font-weight: 600;">mental health resources</a> or <a href="chat.html" style="color: var(--primary); font-weight: 600;">chatting with Cheerly</a> for support.</p>
                        </div>
                    </div>
                `);
            }

            // Most common mood insight
            insights.push(`
                <div class="insight-item">
                    <div class="insight-icon">
                        <span style="font-size: inherit;">❓</span>
                    </div>
                    <div class="insight-content">
                        <h3>Your Most Common Mood</h3>
                        <p>You've felt "${stats.mostCommonMood}" most frequently during this period (${stats.mostCommonPercentage}% of entries). Understanding your baseline mood can help you recognize changes and patterns.</p>
                    </div>
                </div>
            `);

            return insights.join('');
        }

        // Load analytics on page load
        loadAnalytics();
    </script>
</body>
</html>
